version: "1.0"
linter: qodana-android
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
exclude:
  - name: All
    paths:
      - src
      - src/components
      - src/components/GmailIntegrationView.tsx
      - src/modules
      - src/modules/triage-ai
      - src/modules/triage-ai/TelemetryDashboard.tsx
      - cleanup.ts
      - firebase-applet-config.json
