name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main # Change to master if your default branch is master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Install dependencies and build project with injected variables
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      # 3. Authenticate to Google Cloud using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/1046067704682/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-action-1267668613@displaycellpros-com.iam.gserviceaccount.com'

      # 4. Deploy built assets to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ steps.auth.outputs.credentials_json }}'
          projectId: displaycellpros-com
          channelId: live
